services:
  db:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pm_platform
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build:
      context: .
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pm_platform
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace_me
    depends_on:
      - db
volumes:
  db_data:
